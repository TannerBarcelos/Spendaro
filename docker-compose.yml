version: '3.8'
services:
  rest-service:
    build:
      context: ./spendaro/api
      dockerfile: Dockerfile
    volumes:
      - ./spendaro/api:/usr/app
    ports:
      - "8000:8000"
  client-service:
    build:
      context: ./spendaro/client
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./spendaro/client:/usr/app
      - /usr/app/node_modules
    ports:
      - "5173:5173"
