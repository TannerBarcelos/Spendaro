version: '3.8'
services:
  rest-service:
    build:
      context: ./spendaro/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./spendaro/api/.env.local
  client-service:
    build: 
      context: ./spendaro/client
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    env_file:
      - ./spendaro/client/.env.local
